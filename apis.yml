aid: microsoft-azure-front-door
name: Azure Front Door
description: >-
  Azure Front Door Service enables you to define, manage, and monitor the
  global routing for your web traffic. The REST API supports configuring
  routing rules, backend pools, health probes, caching policies, and WAF
  rules for secure and performant application delivery at the edge.
